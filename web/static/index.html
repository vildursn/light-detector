<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Light Detector</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #07080f; color: #d0d4e0; font-family: 'Courier New', monospace; height: 100dvh; display: flex; flex-direction: column; }

  header {
    background: #0d0f1a; border-bottom: 1px solid #1e2236;
    padding: 8px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  #dot { width: 9px; height: 9px; border-radius: 50%; background: #333; transition: background .4s; }
  #dot.on { background: #00e676; box-shadow: 0 0 6px #00e676; }
  header h1 { font-size: .85rem; letter-spacing: .15em; text-transform: uppercase; color: #8090b0; }
  #controls { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
  #btn-back, #btn-forward,
  #btn-playpause {
    background: #1a1e2e; border: 1px solid #2a3050; color: #8ab0e0;
    width: 32px; height: 28px; border-radius: 3px; font-size: 1rem; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s;
  }
  #btn-back:hover, #btn-forward:hover,
  #btn-playpause:hover { background: #1e2f52; border-color: #3a6090; }
  #btn-back:disabled, #btn-forward:disabled,
  #btn-playpause:disabled { opacity: .35; cursor: not-allowed; }
  #analyzer-toggle { display: flex; gap: 4px; }
  #analyzer-toggle button {
    background: #1a1e2e; border: 1px solid #2a3050; color: #4a5a80;
    padding: 4px 12px; border-radius: 3px; font-family: inherit; font-size: .75rem;
    cursor: pointer; letter-spacing: .05em; transition: all .15s;
  }
  #analyzer-toggle button.active { background: #1e2f52; border-color: #3a6090; color: #8ab0e0; }
  #analyzer-toggle button:disabled { opacity: .35; cursor: not-allowed; }
  #btn-camera {
    background: #1a1e2e; border: 1px solid #2a3050; color: #4a5a80;
    padding: 4px 12px; border-radius: 3px; font-family: inherit; font-size: .75rem;
    cursor: pointer; letter-spacing: .05em; transition: all .15s;
  }
  #btn-camera.active { background: #1e2f52; border-color: #3a6090; color: #8ab0e0; }

  main { flex: 1; display: flex; gap: 10px; padding: 10px; overflow: hidden; }

  #feed-wrap { flex: 3 1 0; display: flex; align-items: center; justify-content: center; background: #0b0c14; border: 1px solid #1e2236; border-radius: 4px; overflow: hidden; }
  #feed { max-width: 100%; max-height: 100%; display: block; object-fit: contain; }
  #no-feed { color: #2a3050; font-size: .8rem; }

  #sidebar { flex: 1 1 260px; display: flex; flex-direction: column; min-width: 200px; max-width: 340px; }
  #sidebar h2 { font-size: .7rem; letter-spacing: .12em; text-transform: uppercase; color: #3a4a6a; padding-bottom: 6px; border-bottom: 1px solid #1e2236; margin-bottom: 4px; }

  #log { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #1e2236 transparent; }
  .row { display: grid; grid-template-columns: 62px 52px 58px auto; gap: 6px; padding: 4px 2px; border-bottom: 1px solid #10121c; font-size: .75rem; align-items: center; }
  .ts  { color: #3a4a6a; }
  .col { font-weight: bold; }
  .col-red     { color: #ff4455; }
  .col-green   { color: #22ee77; }
  .col-white   { color: #c8ccdd; }
  .col-unknown { color: #4a5070; }
  .brg { color: #8090b0; }
  .conf { color: #3a4a6a; font-size: .7rem; }
</style>
</head>
<body>
<header>
  <div id="dot"></div>
  <h1>Light Detector</h1>
  <div id="controls">
  <button id="btn-back"      onclick="step('step_back')"    title="Step back (←)" disabled>⏮</button>
  <button id="btn-playpause" onclick="togglePlayback()"       title="Play / Pause (Space)">⏸</button>
  <button id="btn-forward"   onclick="step('step_forward')"  title="Step forward (→)" disabled>⏭</button>
  <div id="analyzer-toggle">
    <button id="btn-cv" onclick="setAnalyzer('opencv')">OpenCV</button>
    <button id="btn-yolo" onclick="setAnalyzer('yolo')">YOLO</button>
  </div>
  <button id="btn-camera" onclick="toggleCamera()" title="Use phone/webcam camera">Camera</button>
  </div>
</header>
<main>
  <div id="feed-wrap">
    <img id="feed" alt="" style="display:none">
    <span id="no-feed">Waiting for feed…</span>
  </div>
  <div id="sidebar">
    <h2>Detections</h2>
    <div id="log"></div>
  </div>
</main>
<script>
  const dot     = document.getElementById('dot');
  const log     = document.getElementById('log');
  const feedWrap = document.getElementById('feed-wrap');
  let prevUrl   = null;

  function addLogRow(ts, color, bearing, confidence) {
    const row = document.createElement('div');
    row.className = 'row';
    const sign = bearing >= 0 ? '+' : '';
    row.innerHTML =
      `<span class="ts">${ts.slice(11)}</span>` +
      `<span class="col col-${color}">${color}</span>` +
      `<span class="brg">${sign}${bearing}°</span>` +
      `<span class="conf">${Math.round(confidence * 100)}%</span>`;
    log.prepend(row);
    while (log.children.length > 300) log.lastChild.remove();
  }

  function connect() {
    const ws = new WebSocket(`ws://${location.host}/ws`);
    ws.binaryType = 'blob';

    ws.onopen  = () => { if (!cameraActive) dot.classList.add('on'); };
    ws.onclose = () => { dot.classList.remove('on'); setTimeout(connect, 2000); };

    ws.onmessage = ({ data }) => {
      if (typeof data === 'string') {
        const d = JSON.parse(data);
        addLogRow(d.ts, d.color, d.bearing, d.confidence);
      } else if (!cameraActive) {
        const url = URL.createObjectURL(data);
        if (prevUrl) URL.revokeObjectURL(prevUrl);
        prevUrl = url;
        const feedEl = document.getElementById('feed');
        const noFeedEl = document.getElementById('no-feed');
        if (feedEl) { feedEl.src = url; feedEl.style.display = 'block'; }
        if (noFeedEl) noFeedEl.style.display = 'none';
      }
    };
  }

  connect();

  const btnPP      = document.getElementById('btn-playpause');
  const btnBack    = document.getElementById('btn-back');
  const btnForward = document.getElementById('btn-forward');
  const btnCamera  = document.getElementById('btn-camera');
  let isLive = false;

  fetch('/api/status').then(r => r.json()).then(s => {
    document.getElementById('btn-yolo').disabled = !s.yolo_available;
    updateToggle(s.analyzer);
    isLive = s.is_live;
    if (isLive) { btnPP.disabled = true; btnBack.disabled = true; btnForward.disabled = true; }
    setPaused(s.paused);
  });

  function setPaused(paused) {
    btnPP.textContent = paused ? '▶' : '⏸';
    if (!isLive) {
      btnBack.disabled    = !paused;
      btnForward.disabled = !paused;
    }
  }

  async function playbackAction(action) {
    const res = await fetch('/api/playback', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action}),
    });
    if (res.ok) setPaused((await res.json()).paused);
  }

  function togglePlayback() { playbackAction('toggle'); }
  function step(dir)        { playbackAction(dir); }

  document.addEventListener('keydown', e => {
    if (e.target !== document.body) return;
    if (e.code === 'Space')       { e.preventDefault(); togglePlayback(); }
    if (e.code === 'ArrowLeft')   { e.preventDefault(); step('step_back'); }
    if (e.code === 'ArrowRight')  { e.preventDefault(); step('step_forward'); }
  });

  function updateToggle(active) {
    document.getElementById('btn-cv').classList.toggle('active', active === 'opencv');
    document.getElementById('btn-yolo').classList.toggle('active', active === 'yolo');
  }

  async function setAnalyzer(type) {
    const res = await fetch('/api/analyzer', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({type}),
    });
    if (res.ok) updateToggle(type);
  }

  // ── Phone / webcam camera mode ────────────────────────────────────────────

  const COLOR_MAP = { red: '#ff4455', green: '#22ee77', white: '#c8ccdd', unknown: '#8090b0' };

  let cameraActive  = false;
  let cameraRunning = false;
  let videoStream   = null;
  const videoEl   = document.createElement('video');
  videoEl.autoplay  = true;
  videoEl.playsInline = true;
  videoEl.muted     = true;
  const offscreen = document.createElement('canvas');
  const offCtx    = offscreen.getContext('2d');

  async function startCamera() {
    if (cameraActive) return;
    try {
      videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    } catch {
      alert('Camera access denied or unavailable.\n\niOS requires HTTPS — connect via https:// or use Android/desktop.');
      return;
    }

    if (!isLive) {
      await fetch('/api/playback', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({action: 'pause'}),
      }).then(r => r.json()).then(s => setPaused(s.paused));
    }

    videoEl.srcObject = videoStream;
    await videoEl.play();

    feedWrap.innerHTML = '';
    const camCanvas = document.createElement('canvas');
    camCanvas.style.cssText = 'max-width:100%;max-height:100%;';
    feedWrap.appendChild(camCanvas);
    const camCtx = camCanvas.getContext('2d');

    cameraActive  = true;
    cameraRunning = true;
    dot.classList.add('on');
    btnCamera.textContent = 'Stop';
    btnCamera.classList.add('active');

    async function captureLoop() {
      if (!cameraRunning) return;
      if (!videoEl.videoWidth) { setTimeout(captureLoop, 50); return; }

      offscreen.width  = videoEl.videoWidth;
      offscreen.height = videoEl.videoHeight;
      offCtx.drawImage(videoEl, 0, 0);

      offscreen.toBlob(async blob => {
        let data = { detections: [], alerts: [] };
        try {
          const res = await fetch('/api/analyze', { method: 'POST', body: blob });
          if (res.ok) data = await res.json();
        } catch (_) {}

        if (!cameraRunning) return;

        camCanvas.width  = offscreen.width;
        camCanvas.height = offscreen.height;
        camCtx.drawImage(offscreen, 0, 0);

        for (const det of data.detections) {
          const c = COLOR_MAP[det.color] || COLOR_MAP.unknown;
          const { x, y, w, h } = det.bbox;
          camCtx.strokeStyle = c;
          camCtx.lineWidth = 2;
          camCtx.strokeRect(x, y, w, h);
          camCtx.fillStyle = c;
          camCtx.font = '11px monospace';
          const sign = det.bearing >= 0 ? '+' : '';
          camCtx.fillText(`${det.color} ${sign}${det.bearing}°`, x + 2, y > 14 ? y - 4 : y + h + 12);
        }

        for (const alert of data.alerts) {
          addLogRow(alert.ts, alert.color, alert.bearing, 1.0);
        }

        if (cameraRunning) setTimeout(captureLoop, 100);
      }, 'image/jpeg', 0.8);
    }

    captureLoop();
  }

  function stopCamera() {
    cameraRunning = false;
    cameraActive  = false;
    if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
    feedWrap.innerHTML = '<img id="feed" alt="" style="display:none"><span id="no-feed">Waiting for feed…</span>';
    btnCamera.textContent = 'Camera';
    btnCamera.classList.remove('active');
    dot.classList.remove('on');
  }

  function toggleCamera() {
    if (cameraActive) stopCamera();
    else startCamera();
  }
</script>
</body>
</html>
